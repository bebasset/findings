<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440">
  <defs>
    <style>
      .win-bg { fill: #1e1e2e; }
      .chrome-bar { fill: #181825; }
      .dot-red   { fill: #f38ba8; }
      .dot-yel   { fill: #f9e2af; }
      .dot-grn   { fill: #a6e3a1; }
      .url-bar   { fill: #313244; rx: 6; }
      .url-text  { fill: #a6adc8; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; }
      .url-redt  { fill: #f38ba8; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; font-style: italic; }
      .lock-icon { fill: #a6e3a1; }
      .page-bg   { fill: #eff1f5; }
      .page-bg-dark { fill: #2a2a3c; }
      .nav-bg    { fill: #e0e0f0; }
      .body-text { fill: #4c4f69; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; }
      .alert-box { fill: #f38ba8; }
      .alert-text { fill: #1e1e2e; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; font-weight: 700; }
      .dialog-bg { fill: #eff1f5; }
      .dialog-border { stroke: #7c7f93; stroke-width: 1; fill: none; }
      .dialog-title { fill: #4c4f69; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; font-weight: 700; }
      .dialog-body { fill: #4c4f69; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; }
      .dialog-btn { fill: #1e66f5; rx: 3; }
      .dialog-btn-text { fill: #eff1f5; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; font-weight: 600; }
      .badge-red { fill: #f38ba8; }
      .badge-text { fill: #1e1e2e; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 800; }
      .watermark { fill: #45475a; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; }
      .tab-text  { fill: #cdd6f4; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; }
      .tab-active-bg { fill: #313244; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="800" height="440" rx="10" class="win-bg"/>
  <rect width="800" height="46" rx="10" class="chrome-bar"/>
  <rect x="0" y="36" width="800" height="10" class="chrome-bar"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="23" r="6" class="dot-red"/>
  <circle cx="44" cy="23" r="6" class="dot-yel"/>
  <circle cx="66" cy="23" r="6" class="dot-grn"/>

  <!-- Nav buttons (back/forward) -->
  <text x="90" y="28" fill="#6c7086" font-family="sans-serif" font-size="16px">‹</text>
  <text x="108" y="28" fill="#6c7086" font-family="sans-serif" font-size="16px">›</text>
  <text x="126" y="28" fill="#6c7086" font-family="sans-serif" font-size="14px">↻</text>

  <!-- URL bar -->
  <rect x="150" y="10" width="500" height="26" rx="6" class="url-bar"/>
  <!-- Lock icon approximation -->
  <text x="162" y="27" class="lock-icon" font-size="12px">🔒</text>
  <text x="182" y="27" class="url-text">https://</text>
  <text x="226" y="27" class="url-redt">[TARGET HOST REDACTED]</text>
  <text x="420" y="27" class="url-text">/dashboard/notes</text>

  <!-- Tabs -->
  <rect x="0" y="46" width="800" height="26" fill="#252537"/>
  <rect x="10" y="50" width="200" height="22" rx="4" class="tab-active-bg"/>
  <text x="110" y="64" text-anchor="middle" class="tab-text">Application Dashboard — Notes</text>

  <!-- Page content area -->
  <rect x="0" y="72" width="800" height="368" class="page-bg"/>

  <!-- Simulated browser app nav bar -->
  <rect x="0" y="72" width="800" height="40" class="nav-bg"/>
  <rect x="20" y="82" width="80" height="18" rx="3" fill="#cba6f7"/>
  <text x="60" y="95" text-anchor="middle" class="alert-text" style="font-size:10px">APP LOGO</text>
  <text x="140" y="95" class="body-text">Dashboard</text>
  <text x="220" y="95" class="body-text">Notes</text>
  <text x="290" y="95" class="body-text">Settings</text>
  <text x="680" y="95" class="url-redt">[USER REDACTED]</text>

  <!-- SANITIZED badge -->
  <rect x="20" y="122" width="90" height="18" rx="3" class="badge-red"/>
  <text x="65" y="135" text-anchor="middle" class="badge-text">SANITIZED</text>
  <text x="118" y="135" fill="#7c7f93" font-family="system-ui" font-size="10px">— application content and user data replaced for this template</text>

  <!-- Page heading -->
  <text x="20" y="165" fill="#4c4f69" font-family="'Segoe UI', sans-serif" font-size="18px" font-weight="700">My Notes</text>

  <!-- Notes list area simulation -->
  <rect x="20" y="178" width="460" height="120" rx="6" fill="#e0e0f0"/>
  <text x="36" y="200" class="body-text" font-weight="600">[NOTE TITLE REDACTED]</text>
  <text x="36" y="218" class="body-text" fill="#7c7f93" font-size="11px">[CONTENT REDACTED]</text>
  <text x="36" y="240" class="body-text" font-weight="600">[NOTE TITLE REDACTED]</text>
  <text x="36" y="258" class="body-text" fill="#7c7f93" font-size="11px">Shared note with XSS payload in content field</text>
  <text x="36" y="280" fill="#f38ba8" font-family="monospace" font-size="11px">▶ [XSS PAYLOAD TRIGGERED]</text>

  <!-- JavaScript alert dialog overlay -->
  <rect x="200" y="220" width="380" height="140" rx="6" class="dialog-bg" filter="drop-shadow(2px 4px 8px rgba(0,0,0,0.3))"/>
  <rect x="200" y="220" width="380" height="140" rx="6" class="dialog-border"/>
  <!-- Dialog title bar -->
  <rect x="200" y="220" width="380" height="28" rx="6" fill="#313244"/>
  <rect x="200" y="238" width="380" height="10" fill="#313244"/>
  <text x="210" y="238" class="tab-text" font-size="11px">JavaScript Alert — [TARGET HOST REDACTED]</text>
  <!-- Dialog body -->
  <text x="220" y="275" class="dialog-title">The page says:</text>
  <text x="220" y="295" class="dialog-body">[TARGET DOMAIN REDACTED]</text>
  <text x="220" y="310" class="dialog-body" fill="#7c7f93" font-size="10px">alert(document.domain) — XSS confirmed</text>
  <!-- Dialog button -->
  <rect x="510" y="334" width="55" height="20" rx="3" class="dialog-btn"/>
  <text x="537" y="347" text-anchor="middle" class="dialog-btn-text">OK</text>

  <!-- Footer watermark -->
  <rect x="0" y="408" width="800" height="32" fill="#e0e0f0"/>
  <text x="20" y="428" class="watermark">Browser: Chromium — Security Testing Build</text>
  <text x="530" y="428" class="watermark">Replace with actual sanitized screenshot</text>
</svg>
