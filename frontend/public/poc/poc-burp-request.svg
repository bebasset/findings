<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <style>
      .win-bg { fill: #1e1e2e; }
      .titlebar { fill: #181825; }
      .titlebar-text { fill: #cdd6f4; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: 600; }
      .dot-red   { fill: #f38ba8; }
      .dot-yel   { fill: #f9e2af; }
      .dot-grn   { fill: #a6e3a1; }
      .tab-active { fill: #f38ba8; rx: 4; }
      .tab-text-active { fill: #1e1e2e; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; font-weight: 700; }
      .code { font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; }
      .kw   { fill: #f38ba8; }
      .path { fill: #89b4fa; }
      .ver  { fill: #cba6f7; }
      .hdr  { fill: #cdd6f4; }
      .val  { fill: #a6e3a1; }
      .body { fill: #fab387; }
      .redt { fill: #f38ba8; font-style: italic; }
      .dim  { fill: #6c7086; }
      .label-badge { fill: #f38ba8; rx: 4; }
      .label-text { fill: #1e1e2e; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 800; }
      .section-hdr { fill: #45475a; }
      .watermark { fill: #313244; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; }
    </style>
  </defs>

  <!-- Window -->
  <rect width="800" height="420" rx="10" class="win-bg"/>
  <rect width="800" height="36" rx="10" class="titlebar"/>
  <rect x="0" y="26" width="800" height="10" class="titlebar"/>

  <!-- Traffic-light buttons -->
  <circle cx="20" cy="18" r="6" class="dot-red"/>
  <circle cx="40" cy="18" r="6" class="dot-yel"/>
  <circle cx="60" cy="18" r="6" class="dot-grn"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" class="titlebar-text">Burp Suite Professional — HTTP Request (Intercepted)</text>

  <!-- Tab bar -->
  <rect x="12" y="42" width="130" height="22" rx="4" class="tab-active"/>
  <text x="77" y="57" text-anchor="middle" class="tab-text-active">Raw</text>
  <rect x="150" y="42" width="100" height="22" rx="4" fill="#313244"/>
  <text x="200" y="57" text-anchor="middle" fill="#6c7086" font-family="system-ui" font-size="11px">Params</text>
  <rect x="258" y="42" width="100" height="22" rx="4" fill="#313244"/>
  <text x="308" y="57" text-anchor="middle" fill="#6c7086" font-family="system-ui" font-size="11px">Headers</text>

  <!-- Divider -->
  <line x1="12" y1="70" x2="788" y2="70" stroke="#313244" stroke-width="1"/>

  <!-- [REDACTED] badge -->
  <rect x="12" y="78" width="90" height="18" rx="3" class="label-badge"/>
  <text x="57" y="91" text-anchor="middle" class="label-text">SANITIZED</text>
  <text x="108" y="91" fill="#6c7086" font-family="system-ui" font-size="10px">— host, session, and PII values replaced for this template</text>

  <!-- Request lines -->
  <!-- Line 1: Method -->
  <text x="20" y="120" class="code kw">POST</text>
  <text x="60" y="120" class="code path">/api/search</text>
  <text x="178" y="120" class="code ver">HTTP/1.1</text>

  <!-- Line 2: Host -->
  <text x="20" y="142" class="code hdr">Host:</text>
  <text x="70" y="142" class="code redt">[TARGET-HOST REDACTED]</text>

  <!-- Line 3: Content-Type -->
  <text x="20" y="162" class="code hdr">Content-Type:</text>
  <text x="130" y="162" class="code val">application/x-www-form-urlencoded</text>

  <!-- Line 4: Content-Length -->
  <text x="20" y="182" class="code hdr">Content-Length:</text>
  <text x="145" y="182" class="code val">38</text>

  <!-- Line 5: Cookie -->
  <text x="20" y="202" class="code hdr">Cookie:</text>
  <text x="80" y="202" class="code hdr">session=</text>
  <text x="148" y="202" class="code redt">[SESSION-TOKEN REDACTED]</text>

  <!-- Line 6: User-Agent -->
  <text x="20" y="222" class="code hdr">User-Agent:</text>
  <text x="110" y="222" class="code val">Mozilla/5.0 (Windows NT 10.0; Win64; x64)</text>

  <!-- Line 7: Accept -->
  <text x="20" y="242" class="code hdr">Accept:</text>
  <text x="75" y="242" class="code val">application/json, text/plain, */*</text>

  <!-- Line 8: X-CSRF-Token -->
  <text x="20" y="262" class="code hdr">X-CSRF-Token:</text>
  <text x="130" y="262" class="code redt">[CSRF-TOKEN REDACTED]</text>

  <!-- Blank line -->
  <text x="20" y="282" class="code dim">​</text>

  <!-- Body separator -->
  <line x1="12" y1="288" x2="788" y2="288" stroke="#313244" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="12" y="293" width="50" height="16" rx="3" fill="#313244"/>
  <text x="37" y="305" text-anchor="middle" fill="#6c7086" font-family="system-ui" font-size="10px">BODY</text>

  <!-- Body content (injection payload) -->
  <text x="20" y="330" class="code hdr">q=</text>
  <text x="40" y="330" class="code body">' OR '1'='1</text>
  <text x="130" y="330" class="code dim">  ← injection payload</text>

  <!-- Annotation arrow -->
  <line x1="122" y1="325" x2="122" y2="338" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer bar -->
  <rect x="0" y="395" width="800" height="25" rx="0" fill="#181825"/>
  <rect x="0" y="385" width="800" height="10" fill="#181825"/>
  <text x="20" y="411" class="watermark">Length: 38 bytes</text>
  <text x="200" y="411" class="watermark">Encoding: URL</text>
  <text x="600" y="411" class="watermark">Replace with actual sanitized screenshot</text>
</svg>
